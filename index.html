<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mad Beans – Sessions</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c1a">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg:      #0a0c1a;
  --bg2:     #0d1020;
  --panel:   #0f1224;
  --border:  #1e2248;
  --border2: #2e3870;
  --cyan:    #00e5ff;
  --teal:    #00bcd4;
  --magenta: #e040fb;
  --amber:   #ffab00;
  --green:   #00e676;
  --red:     #ff5252;
  --dim:     #3a4070;
  --text:    #c8d4ff;
  --px: 'Press Start 2P', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  font-family: var(--px);
  background: var(--bg);
  color: var(--text);
  cursor: crosshair;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── THREE.JS CANVAS ────────────────────────── */
#three-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── SCANLINES ─────────────────────────────── */
.scanlines {
  position: fixed; inset: 0; z-index: 998; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent 0px, transparent 1px,
    rgba(0,0,0,0.1) 1px, rgba(0,0,0,0.1) 2px
  );
}

/* ── TOP BAR ───────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,12,26,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border2);
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  box-shadow: 0 2px 30px rgba(0,0,0,0.9);
}

.topbar-logo {
  font-size: 0.75rem;
  color: #fff;
  text-shadow: 3px 3px 0 #000, 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.2);
  letter-spacing: 3px;
  animation: glitch 9s infinite;
}

@keyframes glitch {
  0%,95%,100%{ text-shadow:3px 3px 0 #000, 0 0 20px var(--cyan); transform:none; }
  96%{ text-shadow:-2px 0 var(--magenta), 3px 3px 0 #000; transform:skewX(-3deg); }
  97%{ text-shadow: 2px 0 var(--cyan), 3px 3px 0 #000; transform:skewX(2deg); }
  98%{ transform:none; }
}

.topbar-right { display:flex; align-items:center; gap:10px; }

.pill {
  font-size: 0.3rem;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  background: rgba(15,18,36,0.8);
  color: var(--dim);
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px;
}
.pill.on  { border-color: rgba(0,230,118,0.5); color: var(--green); }
.pill.cy  { border-color: rgba(0,229,255,0.4); color: var(--cyan); }
.dot { width:6px;height:6px; background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1s step-end infinite; }
@keyframes blink{50%{opacity:0}}

/* ── MAIN WRAP ─────────────────────────────── */
.main-wrap {
  position: relative; z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  margin-top: 16px;
}

/* ── LOGO ──────────────────────────────────── */
.game-logo {
  text-align: center;
  animation: fadeDown .7s ease-out both;
}

@keyframes fadeDown {
  from{opacity:0;transform:translateY(-20px)}
  to  {opacity:1;transform:translateY(0)}
}

.game-logo .t1 {
  display: block;
  font-size: 2.6rem;
  color: #fff;
  text-shadow:
    5px 5px 0 #000,
    0 0 30px var(--cyan),
    0 0 60px rgba(0,229,255,0.25);
  letter-spacing: 6px;
  animation: logoPulse 3.5s ease-in-out infinite;
}

@keyframes logoPulse {
  0%,100%{ text-shadow:5px 5px 0 #000, 0 0 20px var(--cyan); }
  50%    { text-shadow:5px 5px 0 #000, 0 0 50px var(--cyan), 0 0 100px rgba(0,229,255,0.3); }
}

.game-logo .t2 {
  display: block;
  font-size: 0.5rem;
  color: var(--dim);
  letter-spacing: 6px;
  margin-top: 10px;
}

/* ── PANEL ─────────────────────────────────── */
.panel {
  background: rgba(11,14,30,0.88);
  backdrop-filter: blur(20px);
  border: 2px solid var(--border2);
  box-shadow:
    10px 10px 0 rgba(0,0,0,0.8),
    0 0 60px rgba(0,229,255,0.07),
    inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 40px 48px;
  width: 480px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: relative;
  overflow: hidden;
  animation: fadeUp .65s .15s ease-out both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:translateY(0)}
}

/* corner accents */
.panel::before {
  content:'';
  position:absolute; top:0; left:0;
  width:20px; height:20px;
  border-top:3px solid var(--cyan);
  border-left:3px solid var(--cyan);
}
.panel::after {
  content:'';
  position:absolute; bottom:0; right:0;
  width:20px; height:20px;
  border-bottom:3px solid var(--cyan);
  border-right:3px solid var(--cyan);
}

/* scanline on panel */
.panel-scan {
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(255,255,255,0.006) 3px, rgba(255,255,255,0.006) 4px
  );
}

.panel > * { position:relative; z-index:1; }

/* section label */
.s-label {
  font-size: 0.38rem;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,229,255,0.4);
  letter-spacing: 2px;
  margin-bottom: -12px;
}

/* divider */
.divider {
  border: none;
  border-top: 1px solid var(--border2);
  position: relative;
}
.divider::after {
  content:'✦';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background: rgba(11,14,30,0.88);
  padding:0 10px;
  font-size:0.45rem;
  color:var(--border2);
}

/* ── INPUTS ────────────────────────────────── */
.input-group { display:flex; flex-direction:column; gap:10px; }

.field-label {
  font-size: 0.32rem;
  color: var(--dim);
  letter-spacing: 2px;
}

.name-input {
  font-family: var(--px);
  font-size: 0.7rem;
  letter-spacing: 4px;
  color: var(--cyan);
  background: rgba(5,8,20,0.8);
  border: 2px solid var(--border2);
  padding: 16px 18px;
  outline: none;
  text-transform: uppercase;
  width: 100%;
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5);
  transition: border-color .15s, background .15s, box-shadow .15s;
}
.name-input::placeholder { color: var(--border2); }
.name-input:focus {
  border-color: var(--cyan);
  background: rgba(0,20,40,0.9);
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5), 0 0 16px rgba(0,229,255,0.15);
}

/* ── BUTTONS ───────────────────────────────── */
.btn {
  font-family: var(--px);
  font-size: 0.65rem;
  letter-spacing: 3px;
  border: none; cursor: crosshair;
  padding: 18px;
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  transition: transform .08s, box-shadow .08s, background .08s;
}

.btn-create {
  background: var(--cyan);
  color: #000;
  box-shadow: 6px 6px 0 #000, 0 0 20px rgba(0,229,255,0.3);
}
.btn-create:hover {
  background: #fff;
  transform: translate(-3px,-3px);
  box-shadow: 9px 9px 0 #000, 0 0 32px rgba(0,229,255,0.5);
}
.btn-create:active {
  transform: translate(4px,4px);
  box-shadow: 2px 2px 0 #000;
}

/* join */
.join-row { display:flex; gap:0; }

.code-input {
  font-family: var(--px);
  font-size: 0.7rem;
  letter-spacing: 5px;
  color: var(--magenta);
  background: rgba(5,8,20,0.8);
  border: 2px solid var(--border2); border-right: none;
  padding: 16px 16px;
  width: 100%; outline: none;
  text-transform: uppercase;
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5);
  transition: border-color .15s, background .15s;
}
.code-input::placeholder { color: var(--border2); letter-spacing:4px; }
.code-input:focus {
  border-color: var(--magenta);
  background: rgba(20,0,30,0.9);
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.5), 0 0 16px rgba(224,64,251,0.15);
}

.btn-join {
  font-family: var(--px);
  font-size: 0.55rem; letter-spacing:2px;
  background: var(--magenta); color: #000;
  border: none; padding: 16px 18px;
  cursor: crosshair; flex-shrink: 0;
  box-shadow: 4px 4px 0 #000;
  transition: transform .08s, box-shadow .08s, background .1s;
}
.btn-join:hover  { background:#f8a8ff; transform:translate(-2px,-2px); box-shadow:6px 6px 0 #000; }
.btn-join:active { transform:translate(3px,3px); box-shadow:1px 1px 0 #000; }

/* msg */
.msg { font-size:0.34rem; letter-spacing:1px; height:14px; transition:opacity .2s; }
.msg.err  { color:var(--red); }
.msg.ok   { color:var(--cyan); }
.msg.hide { opacity:0; }

/* ── BOTTOM TAGS ───────────────────────────── */
.bottom-info {
  display: flex; gap: 14px;
  animation: fadeUp .6s .4s ease-out both;
}

.info-tag {
  font-size: 0.3rem;
  padding: 6px 14px;
  border: 1px solid var(--border2);
  background: rgba(11,14,30,0.7);
  color: var(--dim);
  letter-spacing: 2px;
  display: flex; align-items: center; gap: 7px;
  backdrop-filter: blur(8px);
}
.info-tag.on { border-color:rgba(0,230,118,0.4); color:var(--green); }

/* ── MODAL ─────────────────────────────────── */
.overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .2s;
  backdrop-filter:blur(4px);
}
.overlay.show{opacity:1;pointer-events:all}

.modal {
  background: rgba(11,14,30,0.97);
  border: 3px solid var(--cyan);
  box-shadow: 10px 10px 0 #000, 0 0 60px rgba(0,229,255,0.25);
  padding: 40px 48px;
  display:flex; flex-direction:column;
  align-items:center; gap:24px;
  min-width:360px;
  position:relative;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;
  width:20px;height:20px;
  border-top:3px solid var(--cyan);border-left:3px solid var(--cyan);
}
.modal::after{
  content:'';position:absolute;bottom:0;right:0;
  width:20px;height:20px;
  border-bottom:3px solid var(--cyan);border-right:3px solid var(--cyan);
}

.modal-title{
  font-size:0.6rem; color:var(--cyan);
  letter-spacing:3px;
  text-shadow:0 0 14px rgba(0,229,255,0.6);
}

.modal-code {
  font-size:2rem; color:#fff;
  letter-spacing:14px;
  text-shadow:0 0 30px var(--cyan), 0 0 60px rgba(0,229,255,0.3);
  background:rgba(5,8,20,0.9);
  border:2px solid var(--border2);
  padding:20px 32px;
  box-shadow:inset 4px 4px 0 rgba(0,0,0,0.5);
}

.modal-sub{
  font-size:0.34rem; color:var(--dim);
  letter-spacing:1px; text-align:center; line-height:2.6;
}

.btn-close {
  font-family:var(--px);
  font-size:0.42rem; letter-spacing:2px;
  background:var(--border2); color:var(--text);
  border:none; padding:14px 26px;
  cursor:crosshair;
  box-shadow:4px 4px 0 #000;
  transition:transform .08s,box-shadow .08s,background .1s;
}
.btn-close:hover{background:var(--teal);color:#000;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000;}
.btn-close:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000;}
</style>
</head>
<body>

<div class="scanlines"></div>

<!-- THREE.JS background -->
<canvas id="three-canvas"></canvas>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">⚑ SESSION CREATED!</div>
    <div class="modal-code" id="modal-code">······</div>
    <div class="modal-sub">
      SHARE THIS CODE WITH<br>
      YOUR 3 TEAMMATES.<br>
      WAITING FOR PLAYERS...
    </div>
    <button class="btn-close" onclick="closeModal()">✕ CLOSE</button>
  </div>
</div>

<!-- Top bar -->
<header class="topbar">
  <span class="topbar-logo">MAD BEANS</span>
  <div class="topbar-right">
    <span class="pill on"><span class="dot"></span>SERVER ONLINE</span>
    <span class="pill cy">SESSIONS: <span id="active-count" style="margin-left:6px">—</span></span>
    <span class="pill">v0.1.0 BETA</span>
  </div>
</header>

<!-- Main -->
<div class="main-wrap">

  <div class="game-logo">
    <span class="t1">MAD BEANS</span>
    <span class="t2">MANAGE THE MADNESS</span>
  </div>

  <div class="panel">
    <div class="panel-scan"></div>

    <!-- Name -->
    <div class="input-group">
      <div class="field-label">▸ YOUR CHEF NAME</div>
      <input class="name-input" id="username"
        maxlength="12" placeholder="CHEF_NAME"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9_]/g,'')">
    </div>

    <hr class="divider">

    <!-- Create -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="s-label">▸ NEW SESSION</div>
      <button class="btn btn-create" onclick="createSession()">
        ⚑ &nbsp;CREATE SESSION
      </button>
    </div>

    <hr class="divider">

    <!-- Join -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="s-label" style="color:var(--magenta);text-shadow:0 0 8px rgba(224,64,251,0.4)">▸ JOIN SESSION</div>
      <div class="join-row">
        <input class="code-input" id="code-input"
          maxlength="6" placeholder="ABC123"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')joinSession()">
        <button class="btn-join" onclick="joinSession()">JOIN ▶</button>
      </div>
      <div class="msg hide" id="msg"></div>
    </div>

  </div>

  <div class="bottom-info">
    <span class="info-tag on"><span class="dot"></span><span id="sessions-tag">0 ACTIVE SESSIONS</span></span>
    <span class="info-tag">4-PLAYER CO-OP</span>
    <span class="info-tag">ROGUELIKE</span>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
//  THREE.JS — 3D COFFEE BEANS + STEAM
// ══════════════════════════════════════════════
const canvas3d = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0c1a, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 30);

// Fog for depth
scene.fog = new THREE.FogExp2(0x0a0c1a, 0.018);

// Lights
const ambientLight = new THREE.AmbientLight(0x112244, 0.8);
scene.add(ambientLight);

const cyanLight = new THREE.PointLight(0x00e5ff, 2, 60);
cyanLight.position.set(0, 10, 15);
scene.add(cyanLight);

const warmLight = new THREE.PointLight(0xff8833, 1.5, 50);
warmLight.position.set(-15, -5, 10);
scene.add(warmLight);

const magentaLight = new THREE.PointLight(0xe040fb, 1.2, 40);
magentaLight.position.set(15, 5, 5);
scene.add(magentaLight);

// ── Coffee Bean geometry (ellipsoid + crease) ──
function createBeanGeometry() {
  // Use SphereGeometry scaled to look like a bean
  const geo = new THREE.SphereGeometry(0.5, 12, 8);
  // Squish into bean shape
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    // elongate on Y, flatten on Z
    pos.setXYZ(i, x * 0.7, y * 1.1, z * 0.55);
  }
  geo.computeVertexNormals();
  return geo;
}

// Bean material — rich brown with specular
const beanMat = new THREE.MeshStandardMaterial({
  color: 0x3d1c08,
  roughness: 0.4,
  metalness: 0.15,
});

const beanMatCyan = new THREE.MeshStandardMaterial({
  color: 0x003344,
  roughness: 0.3,
  metalness: 0.4,
  emissive: 0x001122,
  emissiveIntensity: 0.3,
});

// Bean crease — thin dark box across the bean
function createCreaseGeometry() {
  return new THREE.BoxGeometry(0.04, 1.1, 0.1);
}

const creaseMat = new THREE.MeshStandardMaterial({
  color: 0x1a0804,
  roughness: 0.9,
});

// ── Create beans ──
const beans = [];
const BEAN_COUNT = 55;
const beanGeo = createBeanGeometry();

for (let i = 0; i < BEAN_COUNT; i++) {
  const isCyan = Math.random() < 0.2;
  const mat = isCyan ? beanMatCyan : beanMat;

  const group = new THREE.Group();

  const bean = new THREE.Mesh(beanGeo, mat);
  group.add(bean);

  const crease = new THREE.Mesh(createCreaseGeometry(), creaseMat);
  crease.position.z = 0.52;
  group.add(crease);

  // Spread across screen
  group.position.set(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 60 + 40,
    (Math.random() - 0.5) * 25 - 5
  );

  group.rotation.set(
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2
  );

  const scale = 0.5 + Math.random() * 1.2;
  group.scale.setScalar(scale);

  beans.push({
    group,
    vy:    0.04 + Math.random() * 0.09,
    vx:    (Math.random() - 0.5) * 0.02,
    rotX:  (Math.random() - 0.5) * 0.02,
    rotY:  (Math.random() - 0.5) * 0.025,
    rotZ:  (Math.random() - 0.5) * 0.015,
    isCyan,
  });

  scene.add(group);
}

// ── Steam particles (simple sprites) ──
const steamParticles = [];
const steamGeo = new THREE.PlaneGeometry(1, 1);
const steamMat = new THREE.MeshBasicMaterial({
  color: 0x00e5ff,
  transparent: true,
  opacity: 0,
  depthWrite: false,
  side: THREE.DoubleSide,
});

for (let i = 0; i < 30; i++) {
  const mat = steamMat.clone();
  const mesh = new THREE.Mesh(steamGeo, mat);

  const x = (Math.random() - 0.5) * 60;
  const y = (Math.random() - 0.5) * 50;
  mesh.position.set(x, y, (Math.random() - 0.5) * 10 - 8);

  const scale = 0.3 + Math.random() * 1.2;
  mesh.scale.setScalar(scale);

  steamParticles.push({
    mesh,
    vy:      0.05 + Math.random() * 0.08,
    vx:      (Math.random() - 0.5) * 0.02,
    life:    Math.random(),
    maxOp:   0.04 + Math.random() * 0.09,
    speed:   0.005 + Math.random() * 0.008,
  });

  scene.add(mesh);
}

// ── Subtle star field ──
const starsGeo = new THREE.BufferGeometry();
const starCount = 300;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3]   = (Math.random() - 0.5) * 200;
  starPos[i*3+1] = (Math.random() - 0.5) * 150;
  starPos[i*3+2] = -30 - Math.random() * 40;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0x8899cc, size: 0.15, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starsGeo, starsMat));

// ── Animate ──
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // Floating cyan light pulse
  cyanLight.intensity = 1.5 + Math.sin(frame * 0.02) * 0.8;

  // Beans fall and rotate
  beans.forEach(b => {
    b.group.position.y -= b.vy;
    b.group.position.x += b.vx;
    b.group.rotation.x += b.rotX;
    b.group.rotation.y += b.rotY;
    b.group.rotation.z += b.rotZ;

    // Reset when off screen bottom
    if (b.group.position.y < -35) {
      b.group.position.y = 38 + Math.random() * 10;
      b.group.position.x = (Math.random() - 0.5) * 80;
    }
  });

  // Steam rises
  steamParticles.forEach(s => {
    s.life += s.speed;
    s.mesh.position.y += s.vy;
    s.mesh.position.x += s.vx;

    const prog = s.life % 1;
    s.mesh.material.opacity = prog < 0.2
      ? (prog / 0.2) * s.maxOp
      : prog > 0.7
        ? ((1 - prog) / 0.3) * s.maxOp
        : s.maxOp;

    if (s.mesh.position.y > 35) {
      s.mesh.position.y = -35;
      s.mesh.position.x = (Math.random() - 0.5) * 60;
      s.life = 0;
    }
  });

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════════════════════════════════════════════
//  SESSION LOGIC
// ══════════════════════════════════════════════
let activeSessions = 3 + Math.floor(Math.random() * 7);

function updateSessions() {
  document.getElementById('active-count').textContent = activeSessions;
  document.getElementById('sessions-tag').textContent =
    `${activeSessions} ACTIVE SESSION${activeSessions !== 1 ? 'S' : ''}`;
}
updateSessions();

setInterval(() => {
  activeSessions = Math.max(0, activeSessions + (Math.random() < 0.5 ? 1 : -1));
  updateSessions();
}, 7000);

function getUsername() {
  return document.getElementById('username').value.trim();
}

function genCode() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

function createSession() {
  const name = getUsername();
  if (!name) { showMsg('⚠ ENTER YOUR CHEF NAME FIRST', 'err'); return; }
  document.getElementById('modal-code').textContent = genCode();
  document.getElementById('overlay').classList.add('show');
  activeSessions++;
  updateSessions();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = `msg ${type}`;
  setTimeout(() => el.className = 'msg hide', 2600);
}

function joinSession() {
  const name = getUsername();
  const code = document.getElementById('code-input').value.trim();
  if (!name)         { showMsg('⚠ ENTER YOUR CHEF NAME FIRST', 'err'); return; }
  if (code.length < 4)  { showMsg('⚠ CODE TOO SHORT', 'err'); return; }
  if (code.length !== 6){ showMsg('⚠ ENTER 6-CHAR CODE', 'err'); return; }
  showMsg(`✔ JOINING ${code} AS ${name}...`, 'ok');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>

        .catch(err => console.error('SW failed:', err));
